<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>input data</title>
</head>
<body>
    <h1>Input Data</h1>
    <form name="myform" action="#">
        <div>
            <label for="">Full Name</label>
            <input type="text" name="fullname" onkeyup="submitform()" placeholder="Enter your name">
        </div>
        <div>
            <label for="">Address</label>
            <input type="text" name="address" onkeyup="submitform()">
        </div>
        <div>
            <input type="button" onclick="submitform()" value="Submit">
        </div>
    </form>
    <hr>
    <div id="result"></div>
    <script src="16_form.js"></script>
</body>
</html>
